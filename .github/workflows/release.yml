name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (must match manifest.json)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - run: npm ci

      - run: npm run build

      - name: Extract release notes
        run: |
          awk "/^## ${{ github.event.inputs.version }} /{found=1; next} found && /^## /{exit} found{print}" CHANGELOG.md > release_notes.md

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.event.inputs.version }}" \
            --title "${{ github.event.inputs.version }}" \
            --notes-file release_notes.md \
            main.js manifest.json styles.css
